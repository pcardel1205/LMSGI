<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear tarjeta</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

#formContainer {
    background: white;
    width: 350px;
    margin: 0 auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

label {
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

#cardsContainer {
    width: 350px;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card h3 {
    margin: 0 0 5px 0;
}

.card p {
    margin: 3px 0;
}

    </style>
</head>
<body>

    <div id="formContainer">
        <h2>Formulario para crear una tarjeta</h2>

        <label>Nombre:</label>
        <input type="text" id="nombre">

        <label>Profesión:</label>
        <input type="text" id="profesion">

        <label>Descripción:</label>
        <input type="text" id="descripcion">

        <button id="crearBtn">Crear Tarjeta</button>
    </div>

    <div id="cardsContainer"></div>

    <script src="script.js"></script>
</body>
</html>
