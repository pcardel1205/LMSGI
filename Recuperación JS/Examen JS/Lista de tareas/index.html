<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de tareas</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

#taskContainer {
    background: white;
    width: 350px;
    margin: 0 auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

#taskInput {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

#addBtn {
    width: 100%;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#addBtn:hover {
    background-color: #0056b3;
}

#taskList {
    margin-top: 20px;
    list-style: none;
    padding: 0;
}

#taskList li {
    background: #eaeaea;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 5px;
}

    </style>
</head>
<body>

    <div id="taskContainer">
        <h2>Lista de tareas</h2>

        <input type="text" id="taskInput" placeholder="Inserta una nueva tarea">
        <button id="addBtn">Agregar tarea</button>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
