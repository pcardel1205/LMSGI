<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de descuento</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

form {
    background: white;
    width: 350px;
    margin: 0 auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

label {
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

p {
    margin-top: 15px;
    font-size: 18px;
}

#resultado {
    font-weight: bold;
}

    </style>
</head>
<body>

    <form>
        <label>Precio sin descuento</label>
        <input type="text" id="precio">

        <label>Descuento</label>
        <input type="text" id="descuento">

        <button type="button" id="btnCalcular">Calcular</button>

        <p>El resultado es: <span id="resultado"></span></p>
    </form>

    <script src="script.js"></script>
</body>
</html>
